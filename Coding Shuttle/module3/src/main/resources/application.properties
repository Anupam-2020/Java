spring.application.name=module3

spring.datasource.url=jdbc:mysql://localhost:3306/test?useSSL=false
spring.datasource.username=root
spring.datasource.password=

#Possible values for spring.jpa.hibernate.ddl-auto:
#update: Updates the database schema on application startup.
#create: Creates the database schema on application startup, destroying previous data.
#validate: Validates the database schema against the entity mappings, without making changes.
#create-drop: Creates the database schema on application startup and drops it on shutdown.
#none: No action will be performed on the database schema.

spring.jpa.hibernate.ddl-auto=update
#Enable logging of SQL statements generated by Hibernate.
spring.jpa.show-sql=true

#Format the SQL statements for better readability in the logs.
spring.jpa.properties.hibernate.format_sql=true

#Specify the Hibernate dialect to use for MySQL. This helps Hibernate generate SQL optimized for MySQL databases.
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
#spring.sql.init.data.locations=classpath:data.sql